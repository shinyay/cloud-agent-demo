# Auto-approve and merge Copilot Coding Agent PRs
#
# When Copilot opens a PR from a copilot/* branch:
# 1. Wait briefly for any CI checks
# 2. Auto-approve the PR
# 3. Auto-merge via squash merge
#
# ⚠️ SAFETY: Only applies to PRs from copilot/* branches.
# Disable by setting repo variable COPILOT_AUTO_MERGE = "false"
#
# NOTE: Uses pull_request_target (not pull_request) so the workflow
# has write permissions to approve and merge the PR.

name: Copilot Auto-Approve & Merge

on:
  pull_request_target:
    types: [opened, synchronize]
    branches: [main]

permissions:
  issues: write
  pull-requests: write
  contents: write

jobs:
  auto-approve-and-merge:
    # Only for Copilot branches
    if: startsWith(github.event.pull_request.head.ref, 'copilot/')
    runs-on: ubuntu-latest
    steps:
      - name: Check if auto-merge is enabled
        id: check
        run: |
          if [ "${{ vars.COPILOT_AUTO_MERGE }}" = "false" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "⏸️ Auto-merge disabled via COPILOT_AUTO_MERGE variable"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Mark PR as ready (if draft)
        if: steps.check.outputs.skip != 'true'
        uses: actions/github-script@v7
        with:
          script: |
            if (context.payload.pull_request.draft) {
              try {
                const mutation = `mutation {
                  markPullRequestReadyForReview(input: {
                    pullRequestId: "${context.payload.pull_request.node_id}"
                  }) { clientMutationId }
                }`;
                await github.graphql(mutation);
                core.info('✅ Marked draft PR as ready for review');
              } catch (e) {
                core.warning(`⚠️ Could not mark ready: ${e.message}`);
              }
            } else {
              core.info('ℹ️ PR is already ready for review');
            }

      - name: Wait for CI checks (with timeout)
        if: steps.check.outputs.skip != 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const maxWait = 5 * 60 * 1000; // 5 min
            const interval = 15 * 1000; // 15 sec
            let waited = 0;
            let checksFound = false;

            // Initial delay — give checks time to register
            core.info('⏳ Waiting 30s for checks to register...');
            await new Promise(r => setTimeout(r, 30000));
            waited += 30000;

            while (waited < maxWait) {
              const { data: checks } = await github.rest.checks.listForRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: context.payload.pull_request.head.sha,
              });

              // Filter out THIS workflow's own check run
              const externalChecks = checks.check_runs.filter(
                c => c.name !== 'auto-approve-and-merge'
              );

              if (externalChecks.length === 0) {
                core.info('ℹ️ No external CI checks found — proceeding to merge');
                break;
              }

              checksFound = true;
              const pending = externalChecks.filter(c => c.status !== 'completed');

              if (pending.length === 0) {
                const failed = externalChecks.filter(
                  c => c.conclusion !== 'success' && c.conclusion !== 'skipped' && c.conclusion !== 'neutral'
                );
                if (failed.length > 0) {
                  core.setFailed(`❌ ${failed.length} check(s) failed — not auto-merging`);
                  return;
                }
                core.info('✅ All external checks passed');
                break;
              }

              core.info(`⏳ Waiting for ${pending.length} check(s)...`);
              await new Promise(r => setTimeout(r, interval));
              waited += interval;
            }

            if (waited >= maxWait && checksFound) {
              core.setFailed('⏰ Timed out waiting for checks');
            }

      - name: Approve PR
        if: steps.check.outputs.skip != 'true'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.pulls.createReview({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              event: 'APPROVE',
              body: '🤖 Auto-approved by Copilot chain workflow.',
            });
            core.info('✅ PR approved');

      - name: Merge PR
        if: steps.check.outputs.skip != 'true'
        uses: actions/github-script@v7
        with:
          script: |
            // Small delay to let approval propagate
            await new Promise(r => setTimeout(r, 5000));

            try {
              await github.rest.pulls.merge({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.payload.pull_request.number,
                merge_method: 'squash',
              });
              core.info('✅ PR merged via squash');
            } catch (e) {
              core.warning(`⚠️ Could not auto-merge: ${e.message}`);
              // Try enabling auto-merge as fallback
              try {
                const mutation = `mutation {
                  enablePullRequestAutoMerge(input: {
                    pullRequestId: "${context.payload.pull_request.node_id}",
                    mergeMethod: SQUASH
                  }) { clientMutationId }
                }`;
                await github.graphql(mutation);
                core.info('✅ Auto-merge enabled as fallback');
              } catch (e2) {
                core.setFailed(`❌ Could not merge or enable auto-merge: ${e2.message}`);
              }
            }
