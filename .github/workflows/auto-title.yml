# Auto-prepend date/time to issue title when created via the report form
name: Auto-Title Issue

on:
  issues:
    types: [opened]

permissions:
  issues: write

jobs:
  add-date-to-title:
    if: contains(github.event.issue.labels.*.name, 'report')
    runs-on: ubuntu-latest
    steps:
      - name: Prepend date/time to issue title
        uses: actions/github-script@v7
        with:
          script: |
            const now = new Date();
            // Format as JST (UTC+9)
            const jst = new Date(now.getTime() + 9 * 60 * 60 * 1000);
            const dateStr = jst.toISOString().replace('T', ' ').substring(0, 16);

            const currentTitle = context.payload.issue.title;

            // Skip if already has a date prefix
            if (/^\[\d{4}-\d{2}-\d{2}/.test(currentTitle)) {
              core.info('Title already has date prefix — skipping');
              return;
            }

            const newTitle = `[${dateStr} JST] ${currentTitle}`;

            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              title: newTitle,
            });

            core.info(`✅ Title updated: ${newTitle}`);
