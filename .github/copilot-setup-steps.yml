# Copilot Coding Agent — Environment Setup
# This workflow configures the ephemeral environment for the coding agent.

steps:
  - uses: actions/checkout@v4

  - name: Set up Python 3.12
    uses: actions/setup-python@v5
    with:
      python-version: "3.12"

  - name: Install dependencies
    run: |
      pip install --upgrade pip
      pip install -e ".[dev]" || echo "No pyproject.toml yet — skipping install"

  - name: Run linter (if configured)
    run: |
      if command -v ruff &> /dev/null; then
        ruff check src/ tests/ || true
      fi

  - name: Run tests (if configured)
    run: |
      if [ -f "pyproject.toml" ] && grep -q "pytest" pyproject.toml; then
        pytest -v --tb=short || true
      fi
