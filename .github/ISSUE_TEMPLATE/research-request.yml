name: "📊 Research Request"
description: "Request a new intelligence report curated by Copilot Coding Agent"
labels: ["report"]
body:
  - type: markdown
    attributes:
      value: |
        ## 📊 New Intelligence Report Request

        Describe what you'd like to research below. After submitting, **assign this issue to `@copilot`** to start the curation.

        リサーチしたい内容を以下に記入してください。送信後、**Issueを`@copilot`に割り当て**てキュレーションを開始します。

  - type: input
    id: topic
    attributes:
      label: "🔍 Research Topic / リサーチトピック"
      description: "What do you want to research? / 何について調べたいですか？"
      placeholder: "例: 今週のMicrosoft公式ブログの要約 / This week's Microsoft Blog summary"
    validations:
      required: true

  - type: dropdown
    id: persona
    attributes:
      label: "🤖 Persona / ペルソナ"
      description: "Which specialist should write the report? / どの専門家がレポートを作成しますか？"
      options:
        - "🤖 Auto — Best fit based on topic / 自動 — トピックに基づき最適を選択"
        - "── 🌐 Domain Specialists ──────────────────────"
        - "Ⓜ️ Microsoft Specialist — Deep Microsoft expertise, fact-based / Microsoft専門"
        - "🐙 GitHub Specialist — Deep GitHub expertise, developer-centric / GitHub専門"
        - "── 📝 Format Specialists ──────────────────────"
        - "🏢 Executive Analyst — Strategic implications, action items / エグゼクティブ分析"
        - "🔬 Technical Researcher — Specs, APIs, architecture / テクニカルリサーチ"
        - "📰 News Curator — Broad coverage, many articles briefly / ニュースキュレーター"
        - "🇯🇵 Japan Market Specialist — JP context, bilingual / 日本市場スペシャリスト"
        - "🆚 Competitive Analyst — Cross-source comparison / 競合分析"
        - "── ✍️ Content Creators ────────────────────────"
        - "✍️ LinkedIn Draft Assistant — Ready-to-post LinkedIn drafts / LinkedIn投稿作成"
        - "── ⚙️ System ─────────────────────────────────"
        - "🎨 Design Specialist — Frontend design, CSS, layouts / デザイン・フロントエンド"
        - "🛠️ Agent Creator — Create new custom agents / カスタムエージェント作成"
      default: 0
    validations:
      required: true

  - type: dropdown
    id: detail-level
    attributes:
      label: "📊 Detail Level / 詳細レベル"
      description: "How detailed should the report be? / どの程度詳細にしますか？"
      options:
        - "Brief — Key points only / 簡潔 — 要点のみ"
        - "Standard — Summaries + analysis / 標準 — 要約＋分析"
        - "Detailed — Deep analysis + quotes + comparisons / 詳細 — 深い分析＋引用＋比較"
      default: 1
    validations:
      required: true

  - type: dropdown
    id: tone
    attributes:
      label: "🎨 Tone / トーン"
      description: "What writing style should the report use? / レポートの文体は？"
      options:
        - "Executive Briefing — Concise, action-oriented, 'so what?' focus / エグゼクティブ向け — 簡潔で行動指向"
        - "Journalistic — Neutral, fact-driven, news style / ジャーナリスティック — 中立的、事実重視"
        - "Analytical — Data-driven, comparative, trends + implications / 分析的 — データ重視、トレンド＋示唆"
        - "Technical — Precise, detailed, specs + architecture / テクニカル — 正確で詳細、技術仕様"
        - "Casual / Newsletter — Conversational, friendly, light / カジュアル — 会話調、ニュースレター風"
        - "Academic — Formal, structured, heavily cited / アカデミック — 形式的、構造的、引用重視"
        - "Strategic — Forward-looking, competitor-aware, implications / 戦略的 — 将来志向、競合意識、示唆重視"
      default: 0
    validations:
      required: true

  - type: dropdown
    id: language
    attributes:
      label: "🌐 Report Language / レポート言語"
      description: "What language should the report be in? / レポートの言語は？"
      options:
        - "Japanese and English / 日本語と英語"
        - "Japanese / 日本語"
        - "English"
        - "Auto (match source language / ソースに合わせる)"
      default: 0
    validations:
      required: true

  - type: dropdown
    id: sources
    attributes:
      label: "📂 Information Sources / 情報ソース"
      description: "Which sources should be checked? Select 'All Sources' or pick a specific one / どのソースをチェックしますか？"
      options:
        - "All Microsoft + GitHub Sources / 全ソース"
        - "Official Microsoft Blog (blogs.microsoft.com)"
        - "Microsoft AI Blog (microsoft.com/ai/blog)"
        - "Azure Blog (azure.microsoft.com/blog)"
        - "Microsoft Dev Blogs (devblogs.microsoft.com)"
        - "Microsoft Security Blog"
        - "News Center Japan (news.microsoft.com/ja-jp)"
        - "Windows Blog (blogs.windows.com)"
        - "Tech Community (techcommunity.microsoft.com)"
        - "GitHub Blog (github.blog)"
        - "GitHub Changelog (github.blog/changelog)"
        - "GitHub Docs (docs.github.com)"
        - "Microsoft Learn (learn.microsoft.com)"
        - "Other (specify in Additional Instructions)"
      default: 0
    validations:
      required: true

  - type: textarea
    id: instructions
    attributes:
      label: "💬 Additional Instructions / 追加の指示 (optional)"
      description: "Any specific focus, comparisons, or context? / 特定のフォーカスや比較、文脈はありますか？"
      placeholder: "例: 特にAI関連の記事にフォーカスしてください / Focus on AI-related articles"
    validations:
      required: false

  - type: checkboxes
    id: acknowledgment
    attributes:
      label: "✅ Confirmation / 確認"
      options:
        - label: "I understand this report will be published on GitHub Pages / このレポートがGitHub Pagesに公開されることを理解しています"
          required: true

  - type: markdown
    attributes:
      value: |
        ---
        ### 📌 Next Step / 次のステップ
        After submitting this issue, click **Assignees** (right sidebar) → type **`copilot`** → select it.

        このIssueを送信した後、右サイドバーの**Assignees**をクリック → **`copilot`** と入力 → 選択してください。
