<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>
  <header class="site-header">
    <div class="container">
      <h1 class="site-title">
        <a href="{{ '/' | relative_url }}">📊 {{ site.title }}</a>
      </h1>
      <nav class="site-nav">
        <a href="{{ '/' | relative_url }}">Home</a>
        <a href="{{ '/about' | relative_url }}">About</a>
        <a href="https://github.com/shinyay/project-miki/issues/new" target="_blank">+ New Report</a>
      </nav>
    </div>
  </header>

  <main class="container">
    {{ content }}
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>Curated by <a href="https://github.com/features/copilot" target="_blank">GitHub Copilot Coding Agent</a> · 
         <a href="https://github.com/shinyay/project-miki" target="_blank">View on GitHub</a></p>
    </div>
  </footer>
</body>
</html>
