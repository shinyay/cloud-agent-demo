<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
  <meta name="description" content="{% if page.excerpt %}{{ page.excerpt | strip_html | strip_newlines | truncate: 160 }}{% else %}{{ site.description }}{% endif %}">
  <!-- Open Graph / Social sharing -->
  <meta property="og:type" content="{% if page.layout == 'post' %}article{% else %}website{% endif %}">
  <meta property="og:title" content="{% if page.title %}{{ page.title }} | {{ site.title }}{% else %}{{ site.title }}{% endif %}">
  <meta property="og:description" content="{% if page.excerpt %}{{ page.excerpt | strip_html | strip_newlines | truncate: 160 }}{% else %}{{ site.description }}{% endif %}">
  <meta property="og:url" content="{{ page.url | absolute_url }}">
  <meta property="og:site_name" content="{{ site.title }}">
  {% if page.layout == 'post' %}<meta property="article:published_time" content="{{ page.date | date_to_xmlschema }}">{% endif %}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>
  <header class="site-header">
    <div class="container">
      <h1 class="site-title">
        <a href="{{ '/' | relative_url }}">⚡ Copilot Pulse</a>
      </h1>
      <nav class="site-nav">
        <a href="{{ '/' | relative_url }}">Home</a>
        <a href="{{ '/why' | relative_url }}">💡 Why?</a>
        <a href="{{ '/about' | relative_url }}">About</a>
        <a href="{{ '/archive' | relative_url }}">Archive</a>
        <a href="{{ '/admin' | relative_url }}">⚙️ Admin</a>
        <a href="https://github.com/shinyay/cloud-agent-demo/issues/new?template=research-request.yml" target="_blank" class="nav-cta">+ New Report</a>
        <button class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle dark mode">🌙</button>
      </nav>
    </div>
  </header>

  {{ content }}

  <footer class="site-footer">
    <div class="container">
      <div class="footer-content">
        <div>
          <div class="footer-brand">⚡ Copilot Pulse</div>
          <div class="footer-tagline">Real-time intelligence powered by Copilot Cloud Agent</div>
        </div>
        <div class="footer-links">
          <a href="https://github.com/shinyay/cloud-agent-demo" target="_blank">GitHub</a>
          <a href="{{ '/why' | relative_url }}">Why?</a>
          <a href="{{ '/about' | relative_url }}">About</a>
          <a href="{{ '/archive' | relative_url }}">Archive</a>
          <a href="https://github.com/shinyay/cloud-agent-demo/issues/new?template=research-request.yml" target="_blank">New Report</a>
        </div>
      </div>
    </div>
  </footer>

  <script>
    // Dark mode toggle
    function toggleTheme() {
      const html = document.documentElement;
      const current = html.getAttribute('data-theme');
      const next = current === 'dark' ? 'light' : 'dark';
      html.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);
      document.querySelector('.theme-toggle').textContent = next === 'dark' ? '☀️' : '🌙';
    }

    // Load saved theme
    (function() {
      const saved = localStorage.getItem('theme');
      if (saved) {
        document.documentElement.setAttribute('data-theme', saved);
        if (saved === 'dark') {
          document.querySelector('.theme-toggle').textContent = '☀️';
        }
      }
    })();
  </script>
</body>
</html>
